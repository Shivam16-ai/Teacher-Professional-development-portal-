<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#hero)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="#d4af37" opacity="0.2"/>
  <circle cx="1100" cy="220" r="60" fill="#f8b739" opacity="0.15"/>
  <circle cx="950" cy="50" r="30" fill="#ffc107" opacity="0.2"/>
  
  <!-- Geometric shapes -->
  <rect x="200" y="40" width="50" height="50" rx="5" fill="#d4af37" opacity="0.15" transform="rotate(15 225 65)"/>
  <rect x="1000" y="150" width="40" height="40" rx="5" fill="#f8b739" opacity="0.2" transform="rotate(-20 1020 170)"/>
  
  <!-- Book icon in center -->
  <rect x="550" y="110" width="100" height="80" rx="5" fill="#f8f9fa" opacity="0.3"/>
  <line x1="600" y1="110" x2="600" y2="190" stroke="#fff" stroke-width="3" opacity="0.4"/>
</svg>
