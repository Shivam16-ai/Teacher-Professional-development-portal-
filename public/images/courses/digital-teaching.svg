<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="digital" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6f42c1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#digital)"/>
  
  <!-- Computer monitor -->
  <rect x="120" y="60" width="160" height="100" rx="5" fill="#f8f9fa" opacity="0.95"/>
  <rect x="130" y="70" width="140" height="75" fill="#1e3a5f" opacity="0.8"/>
  
  <!-- Code lines -->
  <line x1="140" y1="85" x2="180" y2="85" stroke="#28a745" stroke-width="2"/>
  <line x1="140" y1="95" x2="200" y2="95" stroke="#ffc107" stroke-width="2"/>
  <line x1="140" y1="105" x2="160" y2="105" stroke="#28a745" stroke-width="2"/>
  <line x1="140" y1="115" x2="220" y2="115" stroke="#17a2b8" stroke-width="2"/>
  <line x1="140" y1="125" x2="190" y2="125" stroke="#ffc107" stroke-width="2"/>
  
  <!-- Monitor stand -->
  <rect x="185" y="160" width="30" height="15" rx="2" fill="#f8f9fa" opacity="0.9"/>
  <rect x="160" y="175" width="80" height="5" rx="2" fill="#f8f9fa" opacity="0.9"/>
  
  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="12" fill="#ffc107" opacity="0.4"/>
  <circle cx="340" cy="140" r="18" fill="#28a745" opacity="0.4"/>
</svg>
