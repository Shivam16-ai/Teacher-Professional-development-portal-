  <path d="M200 125 L190 155" stroke="#fff" stroke-width="4" opacity="0.9"/>
  <path d="M200 125 L210 155" stroke="#fff" stroke-width="4" opacity="0.9"/>
  
  <circle cx="250" cy="80" r="15" fill="#fff" opacity="0.9"/>
