<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="math" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#17a2b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20c997;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#math)"/>
  
  <!-- Mathematical symbols -->
  <text x="160" y="90" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#fff" opacity="0.9">π</text>
  <text x="210" y="90" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#fff" opacity="0.9">∑</text>
  <text x="170" y="150" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="#fff" opacity="0.9">∫</text>
  <text x="215" y="145" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" opacity="0.9">√</text>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="12" fill="#ffc107" opacity="0.4"/>
  <circle cx="320" cy="140" r="18" fill="#fff" opacity="0.4"/>
</svg>
