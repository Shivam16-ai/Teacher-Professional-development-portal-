<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pedagogy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#pedagogy)"/>
  
  <!-- Book icon -->
  <rect x="150" y="50" width="100" height="100" rx="5" fill="#f8f9fa" opacity="0.9"/>
  <line x1="200" y1="50" x2="200" y2="150" stroke="#1e3a5f" stroke-width="3"/>
  <line x1="165" y1="75" x2="190" y2="75" stroke="#d4af37" stroke-width="3"/>
  <line x1="165" y1="90" x2="190" y2="90" stroke="#d4af37" stroke-width="3"/>
  <line x1="165" y1="105" x2="190" y2="105" stroke="#d4af37" stroke-width="3"/>
  <line x1="210" y1="75" x2="235" y2="75" stroke="#d4af37" stroke-width="3"/>
  <line x1="210" y1="90" x2="235" y2="90" stroke="#d4af37" stroke-width="3"/>
  <line x1="210" y1="105" x2="235" y2="105" stroke="#d4af37" stroke-width="3"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="50" r="15" fill="#d4af37" opacity="0.3"/>
  <circle cx="320" cy="150" r="20" fill="#f8b739" opacity="0.3"/>
</svg>
