<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bar chart -->
  <line x1="60" y1="220" x2="240" y2="220" stroke="#6c757d" stroke-width="3"/>
  <line x1="60" y1="80" x2="60" y2="220" stroke="#6c757d" stroke-width="3"/>
  
  <!-- Bars -->
  <rect x="80" y="160" width="30" height="60" rx="4" fill="#17a2b8"/>
  <rect x="120" y="130" width="30" height="90" rx="4" fill="#28a745"/>
  <rect x="160" y="110" width="30" height="110" rx="4" fill="#ffc107"/>
  <rect x="200" y="140" width="30" height="80" rx="4" fill="#6f42c1"/>
  
  <!-- Trend line -->
  <path d="M 90 180 L 135 155 L 175 140 L 215 160" stroke="#dc3545" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="5,5"/>
  
  <!-- Data points on line -->
  <circle cx="90" cy="180" r="5" fill="#dc3545"/>
  <circle cx="135" cy="155" r="5" fill="#dc3545"/>
  <circle cx="175" cy="140" r="5" fill="#dc3545"/>
  <circle cx="215" cy="160" r="5" fill="#dc3545"/>
  
  <!-- Pie chart in corner -->
  <circle cx="230" cy="100" r="35" fill="#1e3a5f" opacity="0.8"/>
  <path d="M 230 100 L 230 65 A 35 35 0 0 1 253 85 Z" fill="#d4af37" opacity="0.8"/>
  <path d="M 230 100 L 253 85 A 35 35 0 0 1 253 120 Z" fill="#28a745" opacity="0.8"/>
  
  <!-- Magnifying glass -->
  <circle cx="70" cy="100" r="18" fill="none" stroke="#6c757d" stroke-width="3"/>
  <line x1="83" y1="113" x2="95" y2="125" stroke="#6c757d" stroke-width="3" stroke-linecap="round"/>
</svg>
