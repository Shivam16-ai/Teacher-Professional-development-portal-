<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar base -->
  <rect x="60" y="80" width="200" height="200" rx="12" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="3"/>
  
  <!-- Calendar header -->
  <rect x="60" y="80" width="200" height="50" rx="12" fill="#1e3a5f"/>
  <rect x="60" y="105" width="200" height="25" fill="#1e3a5f"/>
  
  <!-- Rings -->
  <rect x="90" y="65" width="10" height="30" rx="5" fill="#4a5568"/>
  <rect x="135" y="65" width="10" height="30" rx="5" fill="#4a5568"/>
  <rect x="175" y="65" width="10" height="30" rx="5" fill="#4a5568"/>
  <rect x="220" y="65" width="10" height="30" rx="5" fill="#4a5568"/>
  
  <!-- Month text simulation -->
  <line x1="85" y1="100" x2="230" y2="100" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Week days header -->
  <rect x="60" y="130" width="200" height="25" fill="#e2e8f0"/>
  
