  <rect x="102" y="261" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="134" y="261" width="24" height="24" rx="4" fill="#17a2b8" opacity="0.8"/>
  <rect x="166" y="261" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="198" y="261" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="230" y="261" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  
  <!-- Notification badges -->
