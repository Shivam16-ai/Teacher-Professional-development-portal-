  <rect x="166" y="165" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="198" y="165" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="230" y="165" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  
  <!-- Row 2 -->
  <rect x="70" y="197" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="102" y="197" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="134" y="197" width="24" height="24" rx="4" fill="#d4af37" opacity="0.9"/>
  <rect x="166" y="197" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="198" y="197" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="230" y="197" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  
  <!-- Row 3 -->
  <rect x="70" y="229" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="102" y="229" width="24" height="24" rx="4" fill="#28a745" opacity="0.8"/>
  <rect x="134" y="229" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="166" y="229" width="24" height="24" rx="4" fill="#28a745" opacity="0.8"/>
  <rect x="198" y="229" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  <rect x="230" y="229" width="24" height="24" rx="4" fill="#fff" stroke="#cbd5e0" stroke-width="1"/>
  
