  <circle cx="60" cy="140" r="6" fill="#6f42c1" opacity="0.8"/>
  <circle cx="240" cy="160" r="7" fill="#dc3545" opacity="0.8"/>
  <circle cx="90" cy="240" r="5" fill="#28a745" opacity="0.8"/>
  <circle cx="210" cy="240" r="8" fill="#ffc107" opacity="0.8"/>
  
  <!-- Ribbons -->
  <path d="M 150 190 L 140 270 L 150 260 L 160 270 Z" fill="#dc3545"/>
  <path d="M 150 190 L 170 270 L 160 260 L 150 270 Z" fill="#28a745"/>
