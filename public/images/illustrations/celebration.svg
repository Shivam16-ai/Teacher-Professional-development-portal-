  <rect x="135" y="190" width="30" height="50" fill="#d4af37"/>
  <rect x="110" y="240" width="80" height="15" rx="4" fill="#c9a029"/>
  
  <!-- Trophy handles -->
  <path d="M120 120 Q100 120 100 140 Q100 155 115 155" stroke="#d4af37" stroke-width="5" fill="none"/>
  <path d="M180 120 Q200 120 200 140 Q200 155 185 155" stroke="#d4af37" stroke-width="5" fill="none"/>
  
  <!-- Star on trophy -->
  <circle cx="150" cy="130" r="12" fill="#ffc107"/>
  
  <!-- Confetti -->
  <rect x="50" y="80" width="15" height="15" fill="#dc3545" opacity="0.8" transform="rotate(25 57 87)"/>
  <rect x="230" y="100" width="12" height="12" fill="#28a745" opacity="0.8" transform="rotate(-15 236 106)"/>
  <rect x="80" y="180" width="10" height="10" fill="#17a2b8" opacity="0.8" transform="rotate(45 85 185)"/>
