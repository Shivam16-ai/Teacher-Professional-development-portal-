<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chat bubbles -->
  
  <!-- Left bubble (incoming) -->
  <rect x="50" y="100" width="120" height="60" rx="15" fill="#1e3a5f"/>
  <path d="M60 160 L50 175 L75 165" fill="#1e3a5f"/>
  <line x1="70" y1="120" x2="150" y2="120" stroke="#fff" stroke-width="3" opacity="0.8"/>
  <line x1="70" y1="135" x2="130" y2="135" stroke="#fff" stroke-width="3" opacity="0.8"/>
  
  <!-- Right bubble (outgoing) -->
  <rect x="130" y="180" width="120" height="60" rx="15" fill="#28a745"/>
  <path d="M240 240 L250 255 L225 245" fill="#28a745"/>
  <line x1="150" y1="200" x2="230" y2="200" stroke="#fff" stroke-width="3" opacity="0.8"/>
  <line x1="150" y1="215" x2="210" y2="215" stroke="#fff" stroke-width="3" opacity="0.8"/>
  
  <!-- Small bubble (typing indicator) -->
  <rect x="50" y="80" width="80" height="40" rx="10" fill="#d4af37"/>
  <circle cx="70" cy="100" r="4" fill="#fff"/>
  <circle cx="85" cy="100" r="4" fill="#fff"/>
  <circle cx="100" cy="100" r="4" fill="#fff"/>
  
  <!-- Robot/AI icon -->
  <circle cx="230" cy="80" r="20" fill="#17a2b8"/>
  <rect x="220" y="68" width="8" height="4" rx="2" fill="#17a2b8"/>
  <rect x="232" y="68" width="8" height="4" rx="2" fill="#17a2b8"/>
  <circle cx="223" cy="78" r="2" fill="#fff"/>
  <circle cx="237" cy="78" r="2" fill="#fff"/>
  <line x1="223" y1="86" x2="237" y2="86" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
</svg>
