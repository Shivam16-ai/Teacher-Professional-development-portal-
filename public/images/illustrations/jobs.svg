<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circles -->
  <circle cx="150" cy="150" r="140" fill="#1e3a5f" opacity="0.05"/>
  <circle cx="150" cy="150" r="110" fill="#1e3a5f" opacity="0.05"/>
  
  <!-- Briefcase -->
  <rect x="100" y="140" width="100" height="80" rx="8" fill="#1e3a5f"/>
  <rect x="100" y="130" width="100" height="15" rx="4" fill="#2c5282"/>
  <rect x="135" y="120" width="30" height="20" rx="5" fill="#2c5282"/>
  
  <!-- Lock/handle -->
  <circle cx="150" cy="165" r="8" fill="#d4af37"/>
  <rect x="148" y="165" width="4" height="15" fill="#d4af37"/>
  
  <!-- Document papers coming out -->
  <rect x="115" y="100" width="70" height="40" rx="4" fill="#f8f9fa" stroke="#ced4da" stroke-width="2"/>
  <line x1="125" y1="115" x2="165" y2="115" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="125" y1="125" x2="155" y2="125" stroke="#1e3a5f" stroke-width="2"/>
  
  <!-- Decorative elements -->
  <circle cx="220" cy="100" r="15" fill="#d4af37" opacity="0.3"/>
  <circle cx="80" cy="200" r="20" fill="#f8b739" opacity="0.3"/>
</svg>
