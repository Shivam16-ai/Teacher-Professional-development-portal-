<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Podium -->
  
  <!-- 2nd place (left) -->
  <rect x="50" y="160" width="70" height="80" rx="4" fill="#adb5bd"/>
  <text x="85" y="205" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
  <circle cx="85" cy="130" r="20" fill="#adb5bd"/>
  <circle cx="85" cy="125" r="12" fill="#fff"/>
  
  <!-- 1st place (center) -->
  <rect x="115" y="130" width="70" height="110" rx="4" fill="#d4af37"/>
  <text x="150" y="190" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
  <circle cx="150" cy="90" r="25" fill="#d4af37"/>
  <circle cx="150" cy="83" r="15" fill="#fff"/>
  
  <!-- Crown on 1st place -->
  <path d="M 140 55 L145 70 L150 60 L155 70 L160 55 L150 65 Z" fill="#ffc107"/>
  <circle cx="143" cy="57" r="3" fill="#dc3545"/>
  <circle cx="150" cy="54" r="3" fill="#dc3545"/>
  <circle cx="157" cy="57" r="3" fill="#dc3545"/>
  
  <!-- 3rd place (right) -->
  <rect x="180" y="180" width="70" height="60" rx="4" fill="#cd7f32"/>
  <text x="215" y="218" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
  <circle cx="215" cy="155" r="18" fill="#cd7f32"/>
  <circle cx="215" cy="150" r="11" fill="#fff"/>
  
  <!-- Trophy -->
  <circle cx="150" cy="260" r="15" fill="#ffc107" opacity="0.5"/>
  
  <!-- Stars decoration -->
  <circle cx="50" cy="80" r="8" fill="#ffc107" opacity="0.4"/>
  <circle cx="250" cy="120" r="10" fill="#ffc107" opacity="0.4"/>
</svg>
