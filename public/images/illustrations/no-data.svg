<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Document with magnifying glass -->
  <rect x="50" y="40" width="80" height="100" rx="5" fill="#f8f9fa" stroke="#ced4da" stroke-width="2"/>
  
  <!-- Document lines -->
  <line x1="65" y1="60" x2="115" y2="60" stroke="#dee2e6" stroke-width="2"/>
  <line x1="65" y1="75" x2="110" y2="75" stroke="#dee2e6" stroke-width="2"/>
  <line x1="65" y1="90" x2="115" y2="90" stroke="#dee2e6" stroke-width="2"/>
  <line x1="65" y1="105" x2="105" y2="105" stroke="#dee2e6" stroke-width="2"/>
  
  <!-- Magnifying glass -->
  <circle cx="120" cy="110" r="25" fill="none" stroke="#6c757d" stroke-width="4"/>
  <line x1="138" y1="128" x2="160" y2="150" stroke="#6c757d" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Question mark in magnifying glass -->
  <text x="114" y="122" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#adb5bd">?</text>
</svg>
