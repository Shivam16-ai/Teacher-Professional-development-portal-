<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bell -->
  <path d="M 150 80 Q 130 80 130 100 L 130 160 Q 130 180 110 190 L 190 190 Q 170 180 170 160 L 170 100 Q 170 80 150 80 Z" fill="#1e3a5f"/>
  
  <!-- Bell top -->
  <rect x="140" y="65" width="20" height="20" rx="10" fill="#2c5282"/>
  
  <!-- Bell bottom -->
  <ellipse cx="150" cy="190" rx="40" ry="8" fill="#4a5568"/>
  
  <!-- Bell clapper -->
  <circle cx="150" cy="200" r="10" fill="#cbd5e0"/>
  
  <!-- Notification badge -->
  <circle cx="185" cy="95" r="22" fill="#dc3545"/>
  <text x="185" y="102" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
  
  <!-- Sound waves -->
  <path d="M 200 120 Q 220 120 230 140" stroke="#d4af37" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 210 110 Q 240 110 255 140" stroke="#d4af37" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
  
  <path d="M 100 120 Q 80 120 70 140" stroke="#d4af37" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 90 110 Q 60 110 45 140" stroke="#d4af37" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.5"/>
  
  <!-- Notification cards below -->
  <rect x="50" y="220" width="200" height="40" rx="8" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="2"/>
  <circle cx="70" cy="240" r="12" fill="#28a745"/>
  <line x1="90" y1="235" x2="230" y2="235" stroke="#1e3a5f" stroke-width="2"/>
  <line x1="90" y1="245" x2="200" y2="245" stroke="#cbd5e0" stroke-width="1.5"/>
</svg>
