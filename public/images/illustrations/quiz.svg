<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Quiz paper -->
  <rect x="80" y="60" width="140" height="180" rx="8" fill="#f8f9fa" stroke="#ced4da" stroke-width="3"/>
  
  <!-- Title underline -->
  <line x1="100" y1="90" x2="200" y2="90" stroke="#1e3a5f" stroke-width="3"/>
  
  <!-- Questions with checkboxes -->
  <!-- Q1 -->
  <rect x="95" y="110" width="15" height="15" rx="2" fill="#28a745" stroke="#28a745" stroke-width="2"/>
  <path d="M98 118 L102 122 L108 112" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="120" y1="118" x2="190" y2="118" stroke="#adb5bd" stroke-width="2"/>
  
  <!-- Q2 -->
  <rect x="95" y="140" width="15" height="15" rx="2" fill="#28a745" stroke="#28a745" stroke-width="2"/>
  <path d="M98 148 L102 152 L108 142" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none"/>
  <line x1="120" y1="148" x2="190" y2="148" stroke="#adb5bd" stroke-width="2"/>
  
  <!-- Q3 -->
  <rect x="95" y="170" width="15" height="15" rx="2" fill="none" stroke="#adb5bd" stroke-width="2"/>
  <line x1="120" y1="178" x2="190" y2="178" stroke="#adb5bd" stroke-width="2"/>
  
  <!-- Q4 -->
  <rect x="95" y="200" width="15" height="15" rx="2" fill="none" stroke="#adb5bd" stroke-width="2"/>
  <line x1="120" y1="208" x2="190" y2="208" stroke="#adb5bd" stroke-width="2"/>
  
  <!-- Pencil -->
  <rect x="170" y="190" width="8" height="50" rx="2" fill="#ffc107" transform="rotate(-30 174 215)"/>
  <path d="M165 235 L160 245 L170 240 Z" fill="#6c757d"/>
  
  <!-- Star decoration -->
  <circle cx="230" cy="80" r="20" fill="#d4af37" opacity="0.3"/>
</svg>
