<svg width="300" height="350" viewBox="0 0 300 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Resume document -->
  <rect x="75" y="50" width="150" height="250" rx="8" fill="#f8f9fa" stroke="#cbd5e0" stroke-width="3"/>
  
  <!-- Header section -->
  <rect x="85" y="60" width="130" height="40" rx="4" fill="#1e3a5f"/>
  
  <!-- Profile circle -->
  <circle cx="110" cy="80" r="12" fill="#d4af37"/>
  
  <!-- Name lines -->
  <line x1="130" y1="73" x2="200" y2="73" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="87" x2="185" y2="87" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Content sections -->
  <!-- Section 1 -->
  <line x1="90" y1="120" x2="140" y2="120" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="135" x2="200" y2="135" stroke="#cbd5e0" stroke-width="2"/>
  <line x1="90" y1="145" x2="190" y2="145" stroke="#cbd5e0" stroke-width="2"/>
  <line x1="90" y1="155" x2="195" y2="155" stroke="#cbd5e0" stroke-width="2"/>
  
  <!-- Section 2 -->
  <line x1="90" y1="180" x2="145" y2="180" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="195" x2="200" y2="195" stroke="#cbd5e0" stroke-width="2"/>
  <line x1="90" y1="205" x2="185" y2="205" stroke="#cbd5e0" stroke-width="2"/>
  
  <!-- Section 3 -->
  <line x1="90" y1="230" x2="150" y2="230" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="245" x2="195" y2="245" stroke="#cbd5e0" stroke-width="2"/>
  <line x1="90" y1="255" x2="180" y2="255" stroke="#cbd5e0" stroke-width="2"/>
  <line x1="90" y1="265" x2="200" y2="265" stroke="#cbd5e0" stroke-width="2"/>
  
  <!-- Skills badges -->
  <rect x="90" y="280" width="35" height="12" rx="6" fill="#28a745" opacity="0.8"/>
  <rect x="130" y="280" width="35" height="12" rx="6" fill="#17a2b8" opacity="0.8"/>
  <rect x="170" y="280" width="35" height="12" rx="6" fill="#ffc107" opacity="0.8"/>
  
  <!-- Pen icon -->
  <rect x="210" y="260" width="8" height="40" rx="2" fill="#6c42c1" transform="rotate(-25 214 280)"/>
  <path d="M 202 295 L 197 305 L 207 300 Z" fill="#4a5568"/>
  
  <!-- Checkmark -->
  <circle cx="240" cy="100" r="20" fill="#28a745" opacity="0.9"/>
  <path d="M 232 100 L 237 105 L 248 94" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>
