<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blackboard -->
  <rect x="50" y="40" width="300" height="200" rx="8" fill="#2d3748"/>
  <rect x="55" y="45" width="290" height="190" rx="6" fill="#1a202c"/>
  
  <!-- Board frame -->
  <rect x="50" y="40" width="300" height="200" rx="8" fill="none" stroke="#4a5568" stroke-width="4"/>
  
  <!-- Chalk writings -->
  <text x="200" y="90" font-family="'Brush Script MT', cursive" font-size="32" fill="#f7fafc" text-anchor="middle">Welcome!</text>
  <line x1="120" y1="110" x2="280" y2="110" stroke="#f7fafc" stroke-width="2" opacity="0.7"/>
  
  <!-- Bullet points -->
  <circle cx="90" cy="140" r="4" fill="#48bb78"/>
  <text x="110" y="145" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">Learn & Grow</text>
  
  <circle cx="90" cy="170" r="4" fill="#4299e1"/>
  <text x="110" y="175" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">Advance Career</text>
  
  <circle cx="90" cy="200" r="4" fill="#ed8936"/>
  <text x="110" y="205" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0">Connect Teachers</text>
  
  <!-- Book on desk -->
  <rect x="270" y="230" width="60" height="40" rx="3" fill="#e53e3e" opacity="0.9"/>
  <line x1="300" y1="230" x2="300" y2="270" stroke="#1a202c" stroke-width="2"/>
  
  <!-- Chalk -->
  <rect x="150" y="250" width="40" height="8" rx="4" fill="#f7fafc"/>
  <rect x="150" y="250" width="10" height="8" rx="4" fill="#fbd38d"/>
  
  <!-- Eraser -->
  <rect x="210" y="248" width="30" height="12" rx="2" fill="#4a5568"/>
  <rect x="210" y="248" width="30" height="4" fill="#ed8936"/>
</svg>
